# ~/.config/starship.toml  (managed by dotfiles)
# https://starship.rs/config/
# Symlinked to ~/.config/starship.toml.

# Use the two-line prompt format
format = """
[╭─](bold green)$username$hostname$directory$git_branch$git_status$nodejs$python$rust$java$package
[╰─](bold green)$character """

add_newline = true

# Catppuccin Macchiato palette
palette = "catppuccin_macchiato"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[V](bold yellow)"

[username]
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style)@"
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "[$hostname](bold blue) "
disabled = false

[directory]
style = "cyan bold"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "purple bold"
format = "on [$symbol$branch]($style) "

[git_status]
style = "red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "green bold"

[python]
symbol = " "
format = 'via [$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow bold"

[rust]
symbol = " "
style = "red bold"

[java]
symbol = " "
style = "red dimmed"

[package]
symbol = "📦 "
disabled = false

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[time]
disabled = true

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f4"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"
