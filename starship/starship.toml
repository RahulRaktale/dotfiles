# ~/.config/starship.toml  (managed by dotfiles)
# https://starship.rs/config/
# Symlinked to ~/.config/starship.toml.

# Use the (preset) two-line prompt format
format = """
[╭─](bold green)$username$hostname$directory$git_branch$git_status$nodejs$python$rust$java$package
[╰─](bold green)$character """

add_newline = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[V](bold yellow)"

[username]
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style)@"
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "[$hostname](bold blue) "
disabled = false

[directory]
style = "cyan bold"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "purple bold"
format = "on [$symbol$branch]($style) "

[git_status]
style = "red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "green bold"

[python]
symbol = " "
format = 'via [$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow bold"

[rust]
symbol = " "
style = "red bold"

[java]
symbol = " "
style = "red dimmed"

[package]
symbol = "📦 "
disabled = false

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[time]
disabled = true
