# ~/.tmux.conf  (managed by dotfiles)
# -----------------------------------------------------------
# This file is a symlink to ~/.dotfiles/tmux/.tmux.conf.
# Reload after editing with `prefix + r` or `tmux source ~/.tmux.conf`.
# -----------------------------------------------------------

# -----------------------------------------------------------
# Keybindings (sourced from a separate file)
# -----------------------------------------------------------
source-file ~/.tmux/tmux-keybindings.conf

# -----------------------------------------------------------
# General
# -----------------------------------------------------------
# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Start indexes at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Allow special escape codes to passthrough tmux (images, OSC52, etc.)
set -g allow-passthrough on

# Sensible defaults for modern terminals
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc,alacritty:Tc,ghostty:Tc,wezterm:Tc"

# Faster command sequences (no escape delay in nvim, etc.)
set -sg escape-time 0

# Keep a longer scrollback buffer
set -g history-limit 50000

# Focus events for nvim autoread, etc.
set -g focus-events on

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# -----------------------------------------------------------
# Plugins
# -----------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Catppuccin Macchiato theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'macchiato'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#{pane_current_path}"
set -g @catppuccin_status_modules_right "directory user host session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# -----------------------------------------------------------
# Auto-bootstrap TPM and install plugins on first run
# -----------------------------------------------------------
# If TPM is missing, clone it and install all plugins automatically.
# This means a fresh machine just needs this tmux.conf -- no manual
# `prefix + I` required.
if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run-shell 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (KEEP THIS AT THE VERY BOTTOM)
run '~/.tmux/plugins/tpm/tpm'
